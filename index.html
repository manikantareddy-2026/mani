<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}


body{
background:#f4f6fb;
}


header{
height:80px;
background:#2563eb;
color:white;
display:flex;
justify-content:space-around;
align-items:center;
position:sticky;
top:0;
}


.logo{
font-size:30px;
font-weight:bold;
}



button{

padding:12px 25px;
border:none;
border-radius:25px;
background:#f97316;
color:white;
cursor:pointer;
transition:.3s;

}


button:hover{
transform:scale(1.1);
}



.hero{

height:75vh;

background:
linear-gradient(
rgba(0,0,0,.5),
rgba(0,0,0,.5)
),
url("https://images.unsplash.com/photo-1558981806-ec527fa84c39");

background-size:cover;

display:flex;
justify-content:center;
align-items:center;

color:white;
text-align:center;

}


.hero h1{
font-size:60px;
}



.popup{

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%) scale(0);

background:white;

width:350px;

padding:25px;

border-radius:20px;

box-shadow:0 0 20px gray;

transition:.3s;

z-index:20;

}


.show{
transform:translate(-50%,-50%) scale(1);
}



input{

width:100%;
padding:12px;
margin:8px 0;

border-radius:10px;
border:1px solid gray;

}



.profile{

display:none;

position:fixed;

right:20px;

top:90px;

background:white;

padding:20px;

border-radius:15px;

box-shadow:0 0 20px gray;

z-index:15;

}





.video{

padding:50px;
text-align:center;

}



video{

width:1000px;
border-radius:50px;

}




.brands{

padding:40px;
text-align:center;

}



.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(120px,1fr));

gap:20px;

margin-top:30px;

}



.brand{

background:white;

padding:20px;

border-radius:15px;

cursor:pointer;

transition:.3s;

}



.brand:hover{

background:#2563eb;
color:white;

transform:translateY(-10px);

}




.bikes{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(240px,1fr));

gap:25px;

padding:40px;

}



.bike{

background:white;

padding:20px;

border-radius:20px;

box-shadow:0 0 15px #aaa;

transition:.3s;

}


.bike:hover{

transform:scale(1.05);

}



.bike img{

width:100%;

height:180px;

object-fit:cover;

border-radius:15px;

}



</style>

<body>


<header>


<div class="logo">
🏍 Bikers
</div>


<div>

<button onclick="openSignup()">
Signup
</button>


<button onclick="openLogin()">
Login
</button>


</div>


</header>





<section class="hero">

<div>

<h1>Rent Your Dream Bike</h1>

</section>





<div class="popup" id="signupBox">

<input id="sname" placeholder="Name">

<input id="sphone" placeholder="Phone">


<button onclick="otpGenerate()">
Generate OTP
</button>


<p id="otpShow"></p>


<input id="otpInput" placeholder="OTP">


<input id="spass" placeholder="Password">


<button onclick="signupUser()">
Create Account
</button>


</div>





<div class="popup" id="loginBox">


<h2>Login</h2>


<input id="lphone" placeholder="Phone">


<input id="lpass" placeholder="Password">


<button onclick="loginUser()">
Login
</button>


<p id="loginMsg"></p>


</div>





<div class="profile" id="profile">

<h3>Profile</h3>

<p id="profileData"></p>

</div>







<section class="video">

<h2>Bike Video</h2>

<video autoplay muted loop>

<source src="bike.mp4">

</video>


</section>

<div class="brand" onclick="filterBike('Royal')">Royal</div>

</div>


</section>

let container = document.getElementById("bikeContainer");

function showBikes(list){

container.innerHTML="";

list.forEach(b=>{

container.innerHTML += `

<div class="bike" data-brand="${b.brand}">

<img src="${b.img}" alt="${b.name}">

<h2>${b.name}</h2>

<p>₹1000 / Day</p>

<button>Book Now</button>

</div>

`;

});

}

showBikes(bikes);

function filterBike(type){

if(type=="all"){
showBikes(bikes);
return;
}

let filtered = bikes.filter(
bike => bike.brand === type
);

showBikes(filtered);

}

<script>


let otp="";



function openSignup(){

document.getElementById("signupBox")
.classList.add("show");


document.getElementById("loginBox")
.classList.remove("show");


}



function openLogin(){

document.getElementById("loginBox")
.classList.add("show");


document.getElementById("signupBox")
.classList.remove("show");


}






function otpGenerate(){

otp=Math.floor(1000+Math.random()*9000);

document.getElementById("otpShow")
.innerHTML="OTP : "+otp;

}





function signupUser(){


if(
sname.value==""||
sphone.value==""||
otpInput.value!=otp
){

alert("Enter valid details");

return;

}


let user={

name:sname.value,

phone:sphone.value,

password:spass.value

};


localStorage.setItem(
"user",
JSON.stringify(user)
);



alert("Signup Success");


signupBox.classList.remove("show");


}






function loginUser(){


let user=
JSON.parse(
localStorage.getItem("user")
);



if(
user &&
user.phone==lphone.value &&
user.password==lpass.value
){


profile.style.display="block";


profileData.innerHTML=

"Name : "+user.name+
"<br>Phone : "+user.phone;


loginBox.classList.remove("show");


}

else{

loginMsg.innerHTML="Invalid Login";

}


}







function filterBike(type){


document.querySelectorAll(".bike")
.forEach(b=>{


if(
type=="all" ||
b.dataset.brand==type
)

b.style.display="block";


else

b.style.display="none";


});


}


</script>
